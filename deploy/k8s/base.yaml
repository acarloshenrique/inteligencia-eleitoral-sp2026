apiVersion: v1
kind: Namespace
metadata:
  name: intel-eleitoral
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: web-ui
  namespace: intel-eleitoral
spec:
  replicas: 2
  selector:
    matchLabels:
      app: web-ui
  template:
    metadata:
      labels:
        app: web-ui
    spec:
      containers:
        - name: web-ui
          image: ghcr.io/acarloshenrique/inteligencia-eleitoral-sp2026-web:latest
          ports:
            - containerPort: 7860
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: api
  namespace: intel-eleitoral
spec:
  replicas: 2
  selector:
    matchLabels:
      app: api
  template:
    metadata:
      labels:
        app: api
    spec:
      containers:
        - name: api
          image: ghcr.io/acarloshenrique/inteligencia-eleitoral-sp2026-api:latest
          ports:
            - containerPort: 8000
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: worker
  namespace: intel-eleitoral
spec:
  replicas: 2
  selector:
    matchLabels:
      app: worker
  template:
    metadata:
      labels:
        app: worker
    spec:
      containers:
        - name: worker
          image: ghcr.io/acarloshenrique/inteligencia-eleitoral-sp2026-worker:latest
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: api-hpa
  namespace: intel-eleitoral
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: api
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
