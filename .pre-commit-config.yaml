repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
        args: ["--allow-multiple-documents"]
      - id: check-toml
      - id: check-added-large-files
        args: ["--maxkb=1024"]

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.9
    hooks:
      - id: ruff-format
      - id: ruff
        args: ["--fix"]

  - repo: local
    hooks:
      - id: no-compressed-artifacts
        name: block compressed and binary data artifacts
        entry: python scripts/check_no_compressed_artifacts.py
        language: system
        pass_filenames: true
        always_run: true
      - id: mypy-critical-path
        name: mypy critical path
        entry: mypy --no-incremental --disable-error-code import-untyped api/decision_contracts.py api/main.py application/candidate_registry_service.py application/decision_platform_service.py application/territorial_master_service.py application/evidence_service.py application/explanation_service.py domain/decision_models.py scoring allocation ingestion data_catalog
        language: system
        pass_filenames: false
