name: Tests

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:
  schedule:
    - cron: "0 3 * * 1"

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip
      - run: pip install -r requirements.txt ruff "mypy==1.11.2" bandit pip-audit pre-commit
      - run: pre-commit validate-config
      - run: ruff format --check .
      - run: ruff check .
      - run: python scripts/check_no_compressed_artifacts.py
      - run: mypy --no-incremental --disable-error-code import-untyped api/decision_contracts.py api/main.py application/candidate_registry_service.py application/decision_platform_service.py application/territorial_master_service.py application/evidence_service.py application/explanation_service.py application/serving_service.py application/lakehouse_orchestrator.py domain/decision_models.py scoring allocation ingestion data_catalog data_quality feature_store commercial serving
      - run: bandit -q -c pyproject.toml -r application domain infrastructure presentation scripts api workers --severity-level high --confidence-level medium
      - name: Dependency Audit (block high/critical)
        run: |
          set +e
          pip-audit -r requirements.txt --format cyclonedx-json --output pip-audit.json
          audit_status=$?
          set -e
          if [ ! -f pip-audit.json ]; then
            echo "pip-audit failed before producing JSON"
            exit "$audit_status"
          fi
          python scripts/enforce_pip_audit.py pip-audit.json --fail-on critical,high
          if [ "$audit_status" -ne 0 ]; then
            echo "pip-audit reported non-blocking vulnerabilities below high severity."
          fi
      - name: Upload pip-audit report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: pip-audit-json
          path: pip-audit.json
          if-no-files-found: ignore

  test:
    runs-on: ubuntu-latest
    needs: quality
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip
      - run: pip install -r requirements.txt pytest pytest-cov pytest-mock
      - run: pytest tests/contract -v --tb=short -m contract
      - run: pytest tests -v --tb=short --cov=application --cov=domain --cov=infrastructure --cov-report=term-missing --cov-fail-under=65 -m "not load"
      - run: python -m py_compile web_ui/streamlit_app.py presentation/app_main.py healthcheck.py && echo "Syntax OK"
      - run: python healthcheck.py --help

  load:
    if: github.event_name == 'workflow_dispatch' || github.event_name == 'schedule'
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip
      - run: pip install -r requirements.txt pytest
      - run: pytest tests/load -v --tb=short -m load
