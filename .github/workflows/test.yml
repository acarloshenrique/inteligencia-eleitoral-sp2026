name: Tests

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip
      - run: pip install -r requirements.txt pytest
      - run: test -d tests
      - run: pip check
      - run: pytest tests/ -v --tb=short
      - run: python -m py_compile app.py healthcheck.py && echo "Syntax OK"
      - run: python healthcheck.py --help
