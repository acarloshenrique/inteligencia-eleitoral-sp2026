name: Tests

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - run: pip install pip-tools
      - run: python -m piptools compile --resolver=backtracking --output-file requirements.txt requirements.in
      - run: git diff --exit-code requirements.txt
      - run: pip install -r requirements.txt pytest
      - run: pytest tests/ -v --tb=short
      - run: python -m py_compile app.py && echo "Syntax OK"
