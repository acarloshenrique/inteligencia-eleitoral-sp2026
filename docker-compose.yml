version: "3.9"

services:
  app:
    build: .
    ports:
      - "8501:7860"
    environment:
      - GROQ_API_KEY=${GROQ_API_KEY}
    volumes:
      # Monta dados locais sem precisar copiar para a imagem
      - ./data:/app/data:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:7860/_stcore/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # Opcional: Nginx como proxy reverso para produção
